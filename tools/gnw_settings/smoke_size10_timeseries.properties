# Minimal GeneNetWeaver (GNW) settings file - TINY time-series smoke profile.
#
# Format: GNW reads this as a java.util.Properties file
# (ch.epfl.lis.gnw.GnwSettings.loadSettingsFromStream -> Properties.load),
# i.e. plain key = value lines. The defaults live in the GNW source at
# src/ch/epfl/lis/gnw/rsc/settings.txt; this file overrides them for a tiny run.
#
# IMPORTANT - what this can and cannot do with GNW 3.0:
#   * GNW's settings only control HOW experiments are simulated (number/length of
#     time series, noise, which experiment types). They do NOT, by themselves,
#     choose a source network or its size.
#   * The GNW 3.0 command-line tool (ch.epfl.lis.gnw.GnwMain) has only three
#     actions: --help, --regulondb <file>, or (with -s / no extra flag) generate
#     the hardcoded DREAM5 E. coli in-silico compendium. There is NO CLI action
#     that takes "a small network + these settings" and emits a tiny benchmark.
#   * Therefore this file is for: (a) documenting the settings format, and
#     (b) the GNW GUI workflow - load a small (e.g. 10-gene) subnetwork, load
#     these settings, then run DREAM4-style time-series and export. It is also
#     ready for a future custom CLI entry point that accepts a source network.
#
# See docs/gnw_setup.md for the full explanation.

# --- reproducibility / output ---
randomSeed = 1
outputDirectory =
outputGenesInRows = 1
appendZeroInteractionsInGoldStandardFiles = 1
ignoreAutoregulatoryInteractionsInEvaluation = 1

# --- keep it TINY: only one short DREAM4-style time series, nothing else ---
# steady-state experiment types OFF
ssKnockouts = 0
ssKnockdowns = 0
ssMultifactorial = 0
ssDREAM4TimeSeries = 0
ssDualKnockouts = 0
# time-series experiment types: only the DREAM4-style time series, ON
tsKnockouts = 0
tsKnockdowns = 0
tsMultifactorial = 0
tsDREAM4TimeSeries = 1
tsDualKnockouts = 0

# 1 short trajectory of 3 points (t = 0, 50, 100) instead of the default 10 x 1000
numTimeSeries = 1
maxtTimeSeries = 100
dt = 50

# --- deterministic, cheap dynamics (ODE only, no stochastic noise) ---
simulateODE = 1
simulateSDE = 0
maxtSteadyStateODE = 200
addNormalNoise = 0
addLognormalNoise = 0
addMicroarrayNoise = 0
normalizeAfterAddingNoise = 0
